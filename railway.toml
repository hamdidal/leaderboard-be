[build]
builder = "nixpacks"
buildCommand = "npm run build -w packages/shared && npm run prisma:generate -w server && npm run build -w server"

[deploy]
startCommand = "npm run prisma:migrate:deploy -w server && npm run start -w server"
healthcheckPath = "/healthz"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
